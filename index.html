<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মোঃ আব্দুল বাকি মিয়া - প্রোফাইল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .profile-container {
            margin-top: 40px;
            text-align: center;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
            object-fit: cover;
        }

        h1 { margin: 15px 0 5px; font-size: 26px; }
        .subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 10px; }

        /* ঈদ শুভেচ্ছা সেকশন */
        .eid-wish {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .eid-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
            animation: glow 1.5s ease-in-out infinite alternate;
            margin: 0;
        }
        .cow-emoji { font-size: 30px; display: block; margin: 10px 0; }

        @keyframes glow {
            from { text-shadow: 0 0 5px #ff4757, 0 0 10px #ff4757; }
            to { text-shadow: 0 0 15px #ff6b81, 0 0 25px #ff6b81; }
        }

        /* স্মার্ট সোশ্যাল আইকন স্টাইল */
        .card {
            background-color: #1e293b;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* আইকন হোভার কালার */
        .social-item:hover .icon-circle {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .facebook:hover .icon-circle { color: #1877F2; border-color: #1877F2; box-shadow: 0 5px 15px rgba(24, 119, 242, 0.3); }
        .whatsapp:hover .icon-circle { color: #25D366; border-color: #25D366; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }
        .instagram:hover .icon-circle { color: #E4405F; border-color: #E4405F; box-shadow: 0 5px 15px rgba(228, 64, 95, 0.3); }
        .telegram:hover .icon-circle { color: #0088cc; border-color: #0088cc; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3); }

        .social-item span {
            font-size: 11px;
            margin-top: 8px;
            color: #94a3b8;
        }

        /* নোট সেকশন */
        .note-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-left: 4px solid #f59e0b;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="11250.png" alt="Profile" class="profile-img">
        <h1>মোঃ আব্দুল বাকি মিয়া</h1>
        <p class="subtitle">আমার ব্যক্তিগত পেজ</p>
    </div>

    <div class="eid-wish">
        <p class="eid-text">ঈদ মোবারক! 🌙</p>
        <span class="cow-emoji">🐂 🐄 ✨</span>
        <p style="color: #2ed573; font-size: 14px; font-weight: 500;">পবিত্র ঈদুল আযহার শুভেচ্ছা!</p>
    </div>

    <div class="card">
        <h2 style="font-size: 18px; text-align: center; margin-top: 0;">যোগাযোগ করুন 🤝</h2>
        <div class="social-grid">
            <a href="https://www.facebook.com/Abdulbaki231" target="_blank" class="social-item facebook">
                <div class="icon-circle"><i class="fab fa-facebook"></i></div>
                <span>Facebook</span>
            </a>
            <a href="https://wa.me/your-number" target="_blank" class="social-item whatsapp">
                <div class="icon-circle"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
            </a>
            <a href="https://instagram.com/your-username" target="_blank" class="social-item instagram">
                <div class="icon-circle"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
            <a href="https://t.me/your-username" target="_blank" class="social-item telegram">
                <div class="icon-circle"><i class="fab fa-telegram"></i></div>
                <span>Telegram</span>
            </a>
        </div>
    </div>

    <div class="card">
        <h2 style="font-size: 18px; margin-top: 0;">নোট 📝</h2>
        <div class="note-box">এটা আমার তৈরি করা একটি সাইট 😊</div>
        <div class="note-box">মাই ফ্রেন্ড মতিন হি ইজ আ বিগেস্ট ক্রিমিনাল 👽</div>
    </div>

</body>
</html>
