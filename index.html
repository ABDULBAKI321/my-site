<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মোঃ আব্দুল বাকি মিয়া - প্রোফাইল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .profile-container {
            margin-top: 40px;
            text-align: center;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
            object-fit: cover;
        }

        h1 { margin: 15px 0 5px; font-size: 26px; }
        .subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 10px; }

        /* ঈদ শুভেচ্ছা স্টাইল */
        .eid-wish {
            background: rgba(30, 41, 59, 0.5);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin: 20px 0;
            border: 1px dashed #f59e0b;
        }

        .eid-text {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ff8c00, #ff4500, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            margin: 0;
        }

        .eid-subtext {
            color: #00d2ff;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            display: block;
        }

        .animal-emoji {
            font-size: 35px;
            display: block;
            margin: 10px 0;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* সোশ্যাল কার্ড */
        .card {
            background-color: #1e293b;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-item:hover .icon-circle {
            transform: translateY(-5px);
        }

        .facebook:hover .icon-circle { color: #1877F2; border-color: #1877F2; box-shadow: 0 5px 15px rgba(24, 119, 242, 0.3); }
        .whatsapp:hover .icon-circle { color: #25D366; border-color: #25D366; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }
        .instagram:hover .icon-circle { color: #E4405F; border-color: #E4405F; box-shadow: 0 5px 15px rgba(228, 64, 95, 0.3); }
        .telegram:hover .icon-circle { color: #0088cc; border-color: #0088cc; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3); }

        .social-item span { font-size: 11px; margin-top: 8px; color: #94a3b8; }

        .note-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-left: 4px solid #f59e0b;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="VIP_Temp_File_image_repair_1776952696308.jpg" alt="Profile" class="profile-img">
        <h1>মোঃ আব্দুল বাকি মিয়া</h1>
        <p class="subtitle">আমার ব্যক্তিগত পেজ</p>
    </div>

    <div class="eid-wish">
        <p class="eid-text">ঈদ মোবারক! 🌙</p>
        <span class="animal-emoji">🐪  🐃 </span>
        <span class="eid-subtext">পবিত্র ঈদুল আযহার অগ্রিম শুভেচ্ছা! ✨</span>
    </div>

    <div class="card">
        <h2 style="font-size: 18px; text-align: center; margin-top: 0;">যোগাযোগ করুন 🤝</h2>
        <div class="social-grid">
            <a href="https://www.facebook.com/Abdulbaki231" target="_blank" class="social-item facebook">
                <div class="icon-circle"><i class="fab fa-facebook"></i></div>
                <span>Facebook</span>
            </a>
            <a href="https://wa.me/8801575586681" target="_blank" class="social-item whatsapp">
                <div class="icon-circle"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
            </a>
            <a href="https://www.instagram.com/abdul_baki_6.5" target="_blank" class="social-item instagram">
                <div class="icon-circle"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
            <a href="https://t.me/Abdul23104" target="_blank" class="social-item telegram">
                <div class="icon-circle"><i class="fab fa-telegram"></i></div>
                <span>Telegram</span>
            </a>
        </div>
    </div>

    <div class="card">
        <h2 style="font-size: 18px; margin-top: 0;">নোট 📝</h2>
        <div class="note-box">এটা আমার তৈরি করা একটি সাইট 😊</div>
        <div class="note-box">মাই ফ্রেন্ড মতিন হি ইজ আ বিগেস্ট ক্রিমিনাল 👽</div>
        <div class="note-box"> মৃত্যু ব্যতীত সবকিছু মিথ্যে মাই ফ্রেন্ড৷ </div>

    </div>

</body>
    </html>
