<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মোঃ আব্দুল বাকি মিয়া - প্রোফাইল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* প্রোফাইল সেকশন - নতুন ডিজাইন (স্কেচ অনুযায়ী) */
        .header-section {
            display: flex;
            align-items: center;
            width: 90%;
            max-width: 400px;
            margin-top: 30px;
            gap: 20px;
        }

        .profile-img-container {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #f59e0b;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
            object-fit: cover;
        }

        .name-info h1 {
            margin: 0;
            font-size: 22px;
            color: #ffffff;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin: 5px 0 0;
        }

        /* ইমেজ জুম অ্যানিমেশন (Lightbox) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .overlay img {
            max-width: 85%;
            max-height: 85%;
            border-radius: 15px;
            border: 2px solid #f59e0b;
            transform: scale(0.5);
            animation: zoomIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { to { transform: scale(1); } }

        /* ঈদ শুভেচ্ছা ও অন্যান্য কার্ড */
        .card {
            background-color: #1e293b;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .eid-wish {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px dashed #f59e0b;
            text-align: center;
        }

        .eid-text {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ff8c00, #ff4500, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-item:hover .icon-circle { transform: translateY(-5px); border-color: #f59e0b; }
        .social-item span { font-size: 10px; margin-top: 8px; color: #94a3b8; }

        .note-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-left: 4px solid #f59e0b;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="profile-img-container" onclick="openImage()">
            <img src="VIP_Temp_File_image_repair_1776952696308.jpg" alt="Profile" class="profile-img">
        </div>
        <div class="name-info">
            <h1>মোঃ আব্দুল বাকি মিয়া</h1>
            <p class="subtitle">ব্যক্তিগত পেজ</p>
        </div>
    </div>

    <div class="overlay" id="imageOverlay" onclick="closeImage()">
        <img src="VIP_Temp_File_image_repair_1776952696308.jpg" alt="Full Image">
    </div>

    <div class="card eid-wish">
        <p class="eid-text">ঈদ মোবারক! 🌙</p>
        <div style="font-size: 30px; margin: 10px 0;">🐪 🐃</div>
        <p style="color: #00d2ff; font-size: 14px; margin: 0;">পবিত্র ঈদুল আযহার অগ্রিম শুভেচ্ছা! ✨</p>
    </div>

    <div class="card">
        <h2 style="font-size: 16px; text-align: center; margin-top: 0;">যোগাযোগ করুন 🤝</h2>
        <div class="social-grid">
            <a href="https://www.facebook.com/Abdulbaki231" target="_blank" class="social-item">
                <div class="icon-circle" style="color: #1877F2;"><i class="fab fa-facebook"></i></div>
                <span>Facebook</span>
            </a>
            <a href="https://wa.me/8801575586681" target="_blank" class="social-item">
                <div class="icon-circle" style="color: #25D366;"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
            </a>
            <a href="https://www.instagram.com/abdul_baki_6.5" target="_blank" class="social-item">
                <div class="icon-circle" style="color: #E4405F;"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </a>
            <a href="https://t.me/Abdul23104" target="_blank" class="social-item">
                <div class="icon-circle" style="color: #0088cc;"><i class="fab fa-telegram"></i></div>
                <span>Telegram</span>
            </a>
        </div>
    </div>

    <div class="card">
        <h2 style="font-size: 16px; margin-top: 0;">নোট 📝</h2>
        <div class="note-box">এটা আমার তৈরি করা একটি সাইট 😊</div>
        <div class="note-box">মৃত্যু ব্যতীত সবকিছু মিথ্যে মাই ফ্রেন্ড৷</div>
    </div>

    <script>
        function openImage() {
            document.getElementById('imageOverlay').style.display = 'flex';
        }
        function closeImage() {
            document.getElementById('imageOverlay').style.display = 'none';
        }
    </script>

</body>
</html>
